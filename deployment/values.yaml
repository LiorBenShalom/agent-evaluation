global:
  stage: qa
  domain_name: "ovp-ms-template"
  team_name: "platform"
  listenerPorts: '[{ "HTTP": 80 }]'

externalSecrets:
  enabled: false

template:
  enabled: true
  app_name: template
  serviceAccount:
    enable: false
  envFrom:
    - secretRef:
        name: ovp-ms-template-template-secrets
    - secretRef:
        name: ovp-ms-template-template-env-vars
  containers:
    template:
      image:
        registry: template
        tag: latest
      resources:
        limits:
          memory: 1Gi
          cpu: 1
        requests:
          memory: 100Mi
          cpu: 100m
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - arm64
              - key: karpenter.sh/capacity-type
                operator: In
                values:
                  - spot
        - weight: 50
          preference:
            matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
              - key: karpenter.sh/capacity-type
                operator: In
                values:
                  - spot
  tolerations:
    - key: "general-apps"
      operator: "Equal"
      value: "general-apps"
      effect: "NoSchedule"
  service:
    http:
      type: ClusterIP
      ports:
        - name: web
          protocol: "TCP"
          port: 80
          targetPort: 3000
  ingress:
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/healthcheck-path: /health
      alb.ingress.kubernetes.io/listen-ports: "{{ .Values.global.listenerPorts | quote }}"
      external-dns.alpha.kubernetes.io/ttl: "60"
      alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
      alb.ingress.kubernetes.io/success-codes: "200"
  kedaHpa:
    template:
      target:
        apiVersion: "apps/v1"
        name: ovp-ms-template-template
        kind: deployment
      pollingInterval: 10
      cooldownPeriod: 210
      minReplicaCount: 1
      maxReplicaCount: 1
      hpaScaler:
        scaleDown:
          stabilizationWindowSeconds: 900
          selectPolicy: Max
          policies:
            - type: Percent
              value: 30
              periodSeconds: 180
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Min
          policies:
            - type: Percent
              value: 50
              periodSeconds: 30

environments:
  KALTURA_API_ENDPOINT: "https://api.nvq2.ovp.kaltura.com/api_v3/"
  OTEL_MS_NAME: "template"
  OTEL_COLLECTOR_URL: "http://opentelemetry-collector.tools.svc.cluster.local:4317"
