name: Docker Build
run-name: 'Build: ${{ github.ref_name }}'

on:
  push:
    tags:
      - 'v**'
    branches:
      - main
    paths-ignore:
      - 'deployment/**'
      - 'README.md'
      - '.github/**'

jobs:
  docker-build-and-push-image:
    strategy:
      matrix:
        component:
          - template
    uses: kaltura/ovp-pipelines/.github/workflows/buildkit_build.yml@v4
    with:
      architectures: '["arm64", "amd64"]'
      ref: ${{ github.ref_name }}
      docker-file-name: Dockerfile
      ecr-image-name: ${{ matrix.component }}
      default-build-arg: --build-arg APP=${{ matrix.component }}
      additional-tags: >-
        ${{ github.ref_name }}.1.0.${{ github.run_number }}

  deploy-tag-to-chart-latest:
    needs: [docker-build-and-push-image]
    uses: kaltura/ovp-pipelines/.github/workflows/helm.yml@v4
    with:
      is-local: true
      chart-dir-location: deployment
      applications-yaml-keys: 'template:template.containers.template.image.tag'
      values-file-location: 'regions/us-east-1/nvq2/'
      app-repo: ovp-ms-template
      env: nvq2
      image-tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || needs.docker-build-and-push-image.outputs.image-tag }}
      default-branch: main
